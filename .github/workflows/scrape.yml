name: scrape
on:
  schedule:
    - cron: "17 */6 * * *"   # every 6h; also the Supabase keep-alive
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ./pipeline
      - name: Scrape polls into Supabase
        working-directory: pipeline
        run: python cli.py scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: File an issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --state open --search "Scraper failure" --json number --jq '.[0].number' > n.txt || true
          if [ -s n.txt ] && [ "$(cat n.txt)" != "" ]; then
            gh issue comment "$(cat n.txt)" --body "Scrape failed again: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          else
            gh issue create --title "Scraper failure $(date -u +%F)" \
              --body "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID — likely an unmapped party column (merger day, see docs/06) or page layout drift (docs/05)."
          fi
